services:

  # Minio
  minio:
    container_name: minio
    image: minio/minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    networks:
      - test-network
    command: server --console-address ":9001" /data
    volumes:
      - minio_data:/data

  minio-init:
    container_name: minio-init
    image: minio/mc
    depends_on:
      - minio
    networks:
      - test-network
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio123; do
        echo 'Waiting for MinIO server to start';
        sleep 2;
      done;
      mc mb local/warehouse --ignore-existing;
      mc policy set public local/warehouse;
      echo 'Done';
      "

  # Postgres
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - test-network
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: main_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Iceberg
  iceberg-rest:
    image: tabulario/iceberg-rest:0.6.0
    container_name: iceberg-rest
    restart: unless-stopped
    ports:
      - '8181:8181'
    networks:
      - test-network
    environment:
      - CATALOG_TYPE=jdbc
      - CATALOG_WAREHOUSE=s3a://warehouse/
      - CATALOG_IO-IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_JDBC_URI=jdbc:postgresql://postgres:5432/main_db
      - CATALOG_JDBC_USER=admin
      - CATALOG_JDBC_PASSWORD=admin
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - AWS_REGION=us-east-1
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_PATH-STYLE-ACCESS=true
    depends_on:
      - postgres
      - minio

  # Spark
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    environment:
      - PYTHONPATH=/opt/spark
      - AWS_REGION=us-east-1
    ports:
      - '8080:8080'
      - '7077:7077'
    networks:
      - test-network
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
      - ./requirements.txt:/opt/spark/requirements.txt
      - ./.env:/opt/spark/.env
    user: root
    command: >
      /bin/bash -c "
      pip install --no-cache-dir -r /opt/spark/requirements.txt &&
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      "

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    environment:
      - PYTHONPATH=/opt/spark
      - AWS_REGION=us-east-1
    networks:
      - test-network
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
      - ./requirements.txt:/opt/spark/requirements.txt
      - ./.env:/opt/spark/.env
    user: root
    command: >
      /bin/bash -c "
      pip install --no-cache-dir -r /opt/spark/requirements.txt &&
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
      "

volumes:
  postgres_data:
    name: postgres_data
  minio_data:
    name: minio_data

networks:
  test-network:
    driver: bridge
    name: test-network