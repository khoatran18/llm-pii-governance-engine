app:
  name: "AI-Powered Data Governance Platform"
  env: "development" # development, staging, production
  version: "1.0.0"

# =====================================================================
# 1. CẤU HÌNH HẠ TẦNG LƯU TRỮ VÀ DATABASE (INFRASTRUCTURE)
# =====================================================================
database:
  postgres:
    host: "postgres"
    port: 5432
    user: "admin"
    password: ${POSTGRES_PASSWORD}
    database: "main_db"
    uri: jdbc:postgresql://postgres:5432/main_db

storage:
  minio:
    endpoint: "http://minio:9000"
    access_key: "minio"
    secret_key: "${MINIO_SECRET_KEY}"
    bucket_warehouse: "s3a://warehouse/"
    region: "us-east-1"

# =====================================================================
# 2. CẤU HÌNH CÁC ENGINE TÍNH TOÁN (COMPUTE ENGINES)
# =====================================================================
spark:
  master_container_name: "spark-master"
  master_url: "spark://spark-master:7077"
  app_name: "Lakehouse_Ingestion_Job_Test"
  iceberg_catalog_name: "iceberg"
  executor_memory: "2g"
  driver_memory: "1g"
  executor_cores: 1
  executor_instances: 2
  cores_max: 2
  iceberg_db_name: "iceberg_data"
  load_job_name: "CSV_to_Iceberg_JDBC_Job"
  csv_folder: "/app/data/test/*.csv"

trino:
  host: "trino"
  port: 8080
  user: "admin"
  catalog: "iceberg"

# =====================================================================
# 3. CẤU HÌNH DỊCH VỤ DÙNG CHUNG LLM (SHARED SERVICE)
# =====================================================================
llm:
  provider: "deepseek"
  model: "deepseek-chat"
#  model: "deepseek-v4-pro"
  temperature: 0.0
  max_tokens: 2048
  max_retries: 3
  openai_api_key: "${OPENAPI_API_KEY}"
  deepseek_api_key: "${DEEPSEEK_API_KEY}"

# =====================================================================
# 4. CẤU HÌNH LUẬT QUẢN TRỊ VÀ BẢO MẬT (GOVERNANCE & POLICY)
# =====================================================================
governance:
  confidence_threshold: 0.70
  regex_sample_size: 200
  llm_sample_size: 10
  scanning_pipeline:
    - "regex"
    - "llm"

test_suite:
  table_name: "e2e_data"
  total_rows: 5000
  columns_config:
    # RESIDENT_ID
    - column_name: "resident_id"
      sensitivity_tag: "RESIDENT_ID"
      match_percentage: 85
    - column_name: "r7"
      sensitivity_tag: "RESIDENT_ID"
      match_percentage: 85

    # PHONE
    - column_name: "phone_number"
      sensitivity_tag: "PHONE"
      match_percentage: 85
    - column_name: "p4"
      sensitivity_tag: "PHONE"
      match_percentage: 85

    # EMAIL
    - column_name: "email_address"
      sensitivity_tag: "EMAIL"
      match_percentage: 85
    - column_name: "e8"
      sensitivity_tag: "EMAIL"
      match_percentage: 85

    # HEALTH_INSURANCE_ID
    - column_name: "health_insurance_id"
      sensitivity_tag: "HEALTH_INSURANCE_ID"
      match_percentage: 85
    - column_name: "h6"
      sensitivity_tag: "HEALTH_INSURANCE_ID"
      match_percentage: 85

    # NAME
    - column_name: "full_name"
      sensitivity_tag: "NAME"
      match_percentage: 85
    - column_name: "c3"
      sensitivity_tag: "NAME"
      match_percentage: 85

    # ADDRESS
    - column_name: "address"
      sensitivity_tag: "ADDRESS"
      match_percentage: 85
    - column_name: "o2"
      sensitivity_tag: "ADDRESS"
      match_percentage: 85

    # SALARY
    - column_name: "salary"
      sensitivity_tag: "SALARY"
      match_percentage: 85
    - column_name: "m5"
      sensitivity_tag: "SALARY"
      match_percentage: 85

    # DOB
    - column_name: "date_of_birth"
      sensitivity_tag: "DOB"
      match_percentage: 85
    - column_name: "d9"
      sensitivity_tag: "DOB"
      match_percentage: 85

    # NONE
    - column_name: "sys_record_id"
      sensitivity_tag: "NONE"
      match_percentage: 85
    - column_name: "dp"
      sensitivity_tag: "NONE"
      match_percentage: 85
    - column_name: "status_code"
      sensitivity_tag: "NONE"
      match_percentage: 85
    - column_name: "asi"
      sensitivity_tag: "NONE"
      match_percentage: 85

  test_performance:
    ai_governance_pipeline_duration_seconds: 30
    policy_engine_overhead_percentages: 20
    get_mask_columns_latency_ms: 500.0

    target_precision: 0.85
    target_recall: 0.90
    target_f1_score: 0.87
    target_accuracy: 0.80

  masking_policies:
    ADMIN:
      HIGH: "CLEAR_TEXT"
      MEDIUM: "CLEAR_TEXT"
      LOW: "CLEAR_TEXT"
      NONE: "CLEAR_TEXT"
    ANALYST:
      HIGH: "HASH_MASK"
      MEDIUM: "NULLIFY_MASK"
      LOW: "HASH_MASK"
      NONE: "CLEAR_TEXT"
    AUDITOR:
      HIGH: "PARTIAL_MASK"
      MEDIUM: "PARTIAL_MASK"
      LOW: "REDACTED_MASK"
      NONE: "CLEAR_TEXT"
